[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
minversion = 8.0
addopts = -q --strict-markers --disable-warnings --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=10
markers =
    integration: Cross-layer integration smoke tests with mocked externals.
